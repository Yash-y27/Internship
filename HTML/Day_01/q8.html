<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>

<h1>Registration Form</h1>

<form action="#">

    <input type="hidden" name="user_id" value="1001">

    <fieldset>
        <legend>Personal Information</legend>

        <label for="name">Full Name:</label><br>
        <input type="text" id="name" name="name"><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email"><br><br>

        <label for="password">Password:</label><br>
        <input type="password" id="password" name="password"><br><br>

        <label for="age">Age:</label><br>
        <input type="number" id="age" name="age"><br><br>

        <label for="phone">Phone:</label><br>
        <input type="tel" id="phone" name="phone"><br><br>

        <label for="website">Website:</label><br>
        <input type="url" id="website" name="website"><br><br>
    </fieldset>

    <fieldset>
        <legend>Date and Time</legend>

        <label for="dob">Date of Birth:</label><br>
        <input type="date" id="dob" name="dob"><br><br>

        <label for="meeting">Meeting Time:</label><br>
        <input type="time" id="meeting" name="meeting"><br><br>

        <label for="appointment">Appointment:</label><br>
        <input type="datetime-local" id="appointment" name="appointment"><br><br>

        <label for="month">Birth Month:</label><br>
        <input type="month" id="month" name="month"><br><br>

        <label for="week">Week:</label><br>
        <input type="week" id="week" name="week"><br><br>
    </fieldset>

    <fieldset>
        <legend>Preferences</legend>

        <label for="color">Favorite Color:</label><br>
        <input type="color" id="color" name="color"><br><br>

        <label for="experience">Experience (0-10):</label><br>
        <input type="range" id="experience" name="experience" min="0" max="10"><br><br>

        <label for="search">Search Course:</label><br>
        <input type="search" id="search" name="search"><br><br>

        <label for="resume">Upload Resume:</label><br>
        <input type="file" id="resume" name="resume"><br><br>
    </fieldset>

    <fieldset>
        <legend>Gender</legend>

        <input type="radio" id="male" name="gender" value="Male">
        <label for="male">Male</label>

        <input type="radio" id="female" name="gender" value="Female">
        <label for="female">Female</label>

    </fieldset>

    <br>

    <fieldset>
        <legend>Hobbies</legend>

        <input type="checkbox" id="coding" name="hobby" value="Coding">
        <label for="coding">Coding</label><br>

        <input type="checkbox" id="reading" name="hobby" value="Reading">
        <label for="reading">Reading</label><br>

        <input type="checkbox" id="sports" name="hobby" value="Sports">
        <label for="sports">Sports</label>
    </fieldset>

    <br>

    <fieldset>
        <legend>Education</legend>

        <label for="course">Course:</label><br>

        <select id="course" name="course">
            <optgroup label="Engineering">
                <option>Computer Engineering</option>
                <option>Mechanical Engineering</option>
            </optgroup>

            <optgroup label="Management">
                <option>BCA</option>
                <option>MCA</option>
            </optgroup>
        </select>

    </fieldset>

    <br>

    <fieldset>
        <legend>City</legend>

        <label for="city">Choose City:</label><br>

        <input list="cities" id="city" name="city">

        <datalist id="cities">
            <option value="Ahmedabad">
            <option value="Surat">
            <option value="Vadodara">
            <option value="Rajkot">
        </datalist>

    </fieldset>

    <br>

    <fieldset>
        <legend>About You</legend>

        <label for="about">about yourself:</label><br>

        <textarea id="about" name="about" rows="5" cols="40"></textarea>

    </fieldset>

    <br>

    <input type="submit" value="Register">
    <input type="reset" value="Reset">
    <input type="button" value="Help">

</form>

</body>
</html>
