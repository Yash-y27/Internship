<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Validation</h1>

<form action="#">

    <fieldset>
        <legend>Personal Information</legend>

        <label for="name">Full Name:</label><br>
        <input type="text" id="name" name="name" required><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" placeholder="abc@gmail.com" required><br><br>

        <label for="phone">Phone Number:</label><br>
        <input type="tel" id="phone" name="phone" placeholder="9876543210" pattern="[0-9]{10}" title="Enter a 10-digit phone number" required><br><br>

        <label for="password">Password:</label><br>
        <input type="password" id="password" name="password" minlength="8" pattern="(?=.*[A-Z])(?=.*[a-z])(?=.*[0-9]).{8,}"
            title="Minimum 8 characters with at least one uppercase letter, one lowercase letter, and one number." required><br><br>

        <label for="age">Age:</label><br>
        <input type="number" id="age" name="age" min="18" max="100" required ><br><br>

        <label for="dob">Date of Birth:</label><br>
        <input type="date" id="dob" name="dob" max="2026-07-24" required><br><br>

        <label for="photo">Profile Photo:</label><br>
        <input  type="file" id="photo" name="photo" accept="image/*" required><br><br>

    </fieldset>

    <br>


    <input type="submit" value="Register">
    <input type="reset" value="Reset">

</form>

</body>
</html>
